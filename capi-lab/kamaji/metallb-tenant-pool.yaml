---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: $CLUSTER_NAME-vip
  namespace: metallb-system
spec:
  addresses:
    - $CONTROL_PLANE_IP/32
  autoAssign: false
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: $CLUSTER_NAME-vip
  namespace: metallb-system
spec:
  ipAddressPools:
    - $CLUSTER_NAME-vip
