---
# Source https://kamaji.clastix.io/cluster-api/control-plane-provider/
kind: Cluster
apiVersion: cluster.x-k8s.io/v1beta2
metadata:
  labels:
    cluster.x-k8s.io/cluster-name: '${CLUSTER_NAME}'
  name: '${CLUSTER_NAME}'
  namespace: '${NAMESPACE}'
spec:
  controlPlaneRef:
    apiGroup: controlplane.cluster.x-k8s.io
    kind: KamajiControlPlane
    name: '${CLUSTER_NAME}'
  clusterNetwork:
    pods:
      cidrBlocks:
        - '${PODS_CIDR}'
    services:
      cidrBlocks:
        - '${SERVICES_CIDR}'
  infrastructureRef:
    apiGroup: infrastructure.cluster.x-k8s.io
    kind: MetalStackCluster
    name: ${CLUSTER_NAME}
---
# Source https://kamaji.clastix.io/cluster-api/control-plane-provider/
# Defines the control plane of a Tenant Cluster.
kind: KamajiControlPlane
apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
metadata:
  name: '${CLUSTER_NAME}'
  namespace: '${CLUSTER_NAMESPACE}'
spec:
  apiServer: {}
  controllerManager:
    extraArgs:
      - --cloud-provider=external
  dataStoreName: default
  addons:
    coreDNS: {}
    kubeProxy: {}
    konnectivity: {}
  kubelet:
    cgroupfs: systemd
    preferredAddressTypes:
      - InternalIP
  network:
    serviceType: LoadBalancer
    serviceAddress: ${CONTROL_PLANE_IP}
    serviceAnnotations:
      metallb.io/address-pool: ${CLUSTER_NAME}-vip
  version: ${KUBERNETES_VERSION}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: MetalStackCluster
metadata:
  name: ${CLUSTER_NAME}
  namespace: ${NAMESPACE}
spec:
  projectID: ${METAL_PROJECT_ID}
  partition: ${METAL_PARTITION}
  nodeNetworkID: ${METAL_NODE_NETWORK_ID:=null}
  controlPlaneIP: ${CONTROL_PLANE_IP}
  controlPlaneEndpoint:
    host: ${CONTROL_PLANE_IP}
    port: 6443
  firewallDeploymentRef:
    name: ${CLUSTER_NAME}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: MetalStackFirewallDeployment
metadata:
  name: ${CLUSTER_NAME}
  namespace: ${NAMESPACE}
spec:
  autoUpdate:
    machineImage: true
  firewallTemplateRef:
    name: ${CLUSTER_NAME}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: MetalStackFirewallTemplate
metadata:
  name: ${CLUSTER_NAME}
  namespace: ${NAMESPACE}
spec:
  image: ${FIREWALL_MACHINE_IMAGE}
  size: ${FIREWALL_MACHINE_SIZE}
  networks: ${FIREWALL_EXTERNAL_NETWORKS}
  partition: ${METAL_PARTITION}
  project: ${METAL_PROJECT_ID}
  initialRuleSet:
    egress:
      - comment: allow outgoing HTTP and HTTPS traffic
        ports:
          - 80
          - 443
        protocol: TCP
        to:
          - 0.0.0.0/0
      - comment: allow outgoing DNS traffic via TCP
        ports:
          - 53
        protocol: TCP
        to:
          - 0.0.0.0/0
      - comment: allow outgoing traffic to Kamaji tenant API server for kubeadm join and kubelet
        ports:
          - 6443
        protocol: TCP
        to:
          - 0.0.0.0/0
      - comment: allow outgoing traffic to Konnectivity server for control-plane-to-worker tunnels
        ports:
          - 8132
        protocol: TCP
        to:
          - 0.0.0.0/0
      - comment: allow outgoing traffic to metal-api for CCM and CSI
        ports:
          - 8080
        protocol: TCP
        to:
          - 0.0.0.0/0
      - comment: allow outgoing DNS and NTP traffic via UDP
        ports:
          - 53
          - 123
        protocol: UDP
        to:
          - 0.0.0.0/0

    ingress:
      - comment: allow incoming HTTP and HTTPS traffic
        ports:
          - 80
          - 443
        protocol: TCP
        from:
          - 0.0.0.0/0
      - comment: allow incoming kubelet API traffic from Kamaji control plane
        ports:
          - 10250
        protocol: TCP
        from:
          - 0.0.0.0/0
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: MetalStackMachineTemplate
metadata:
  name: ${CLUSTER_NAME}-worker
  namespace: ${NAMESPACE}
spec:
  template:
    spec:
      size: ${WORKER_MACHINE_SIZE}
      image: ${WORKER_MACHINE_IMAGE}
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineDeployment
metadata:
  name: ${CLUSTER_NAME}-md-0
  labels:
    cluster.x-k8s.io/cluster-name: ${CLUSTER_NAME}
    nodepool: nodepool-0
spec:
  clusterName: ${CLUSTER_NAME}
  replicas: ${WORKER_MACHINE_COUNT}
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: ${CLUSTER_NAME}
      nodepool: nodepool-0
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: ${CLUSTER_NAME}
        nodepool: nodepool-0
    spec:
      clusterName: ${CLUSTER_NAME}
      version: "${KUBERNETES_VERSION}"
      bootstrap:
        configRef:
          name: ${CLUSTER_NAME}-md-0
          apiGroup: bootstrap.cluster.x-k8s.io
          kind: KubeadmConfigTemplate
      infrastructureRef:
        name: ${CLUSTER_NAME}-worker
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: MetalStackMachineTemplate
      deletion:
        nodeDrainTimeoutSeconds: 120
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfigTemplate
metadata:
  name: ${CLUSTER_NAME}-md-0
spec:
  template:
    spec:
      format: ignition
      clusterConfiguration:
        controllerManager:
          extraArgs:
            - name: cloud-provider
              value: external
        controlPlaneEndpoint: ${CONTROL_PLANE_IP}
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            - name: cloud-provider
              value: external